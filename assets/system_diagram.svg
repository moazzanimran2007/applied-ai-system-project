<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <style>
    .box { fill:#f7f9fb; stroke:#334155; stroke-width:1.5 }
    .title{ font: 600 14px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
    .label{ font: 400 12px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
    .arrow{ stroke:#0f172a; stroke-width:1.5; fill:none }
  </style>
  <!-- UI -->
  <rect x="20" y="20" width="160" height="80" rx="8" class="box" />
  <text x="100" y="48" text-anchor="middle" class="title">Streamlit UI</text>
  <text x="100" y="68" text-anchor="middle" class="label">app.py (inputs, display)</text>

  <!-- Controller -->
  <rect x="220" y="20" width="160" height="80" rx="8" class="box" />
  <text x="300" y="48" text-anchor="middle" class="title">Controller</text>
  <text x="300" y="68" text-anchor="middle" class="label">PawPalAppController</text>

  <!-- Repository -->
  <rect x="220" y="120" width="160" height="80" rx="8" class="box" />
  <text x="300" y="148" text-anchor="middle" class="title">TaskRepository</text>
  <text x="300" y="168" text-anchor="middle" class="label">in-memory tasks</text>

  <!-- Scheduler -->
  <rect x="420" y="20" width="180" height="80" rx="8" class="box" />
  <text x="510" y="48" text-anchor="middle" class="title">Scheduler</text>
  <text x="510" y="68" text-anchor="middle" class="label">build_plan → DailyPlan</text>

  <!-- Explainer & Retriever -->
  <rect x="420" y="120" width="180" height="80" rx="8" class="box" />
  <text x="510" y="148" text-anchor="middle" class="title">PlanExplainer (RAG)</text>
  <text x="510" y="168" text-anchor="middle" class="label">queries → includes KB snippets</text>

  <!-- Assets -->
  <rect x="640" y="60" width="140" height="60" rx="8" class="box" />
  <text x="710" y="86" text-anchor="middle" class="title">assets/</text>
  <text x="710" y="104" text-anchor="middle" class="label">pet_care_guidance.txt</text>

  <!-- arrows -->
  <path d="M180 60 L220 60" class="arrow" marker-end="url(#a)" />
  <path d="M380 60 L420 60" class="arrow" marker-end="url(#a)" />
  <path d="M300 100 L300 120" class="arrow" marker-end="url(#a)" />
  <path d="M600 100 L600 120" class="arrow" marker-end="url(#a)" />
  <path d="M600 80 L600 60" class="arrow" marker-end="url(#a)" />
  <path d="M600 100 L420 100" class="arrow" marker-end="url(#a)" />

  <!-- arrow marker -->
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 L2,3 z" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Human & Tests -->
  <rect x="20" y="220" width="160" height="80" rx="8" class="box" />
  <text x="100" y="248" text-anchor="middle" class="title">Human / Owner</text>
  <text x="100" y="268" text-anchor="middle" class="label">inspects plan & KB</text>

  <rect x="220" y="220" width="160" height="80" rx="8" class="box" />
  <text x="300" y="248" text-anchor="middle" class="title">Automated Tests</text>
  <text x="300" y="268" text-anchor="middle" class="label">tests/*.py</text>

  <path d="M100 100 L100 220" class="arrow" marker-end="url(#a)" />
  <path d="M300 200 L300 220" class="arrow" marker-end="url(#a)" />

</svg>